# Nginx configuration for ShieldNest v1
# Place this in: /etc/nginx/sites-available/shieldnest-v1
# Enable with: sudo ln -s /etc/nginx/sites-available/shieldnest-v1 /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name v1.shieldnest.org;

    # Redirect HTTP to HTTPS (certbot will handle this automatically)
    # Uncomment after SSL is set up:
    # return 301 https://$server_name$request_uri;

    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    client_max_body_size 10M;
}

