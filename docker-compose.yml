version: '3.8'

services:
  shieldnest-v1:
    build:
      context: ./shuieldnestorg
      dockerfile: Dockerfile
    container_name: shieldnest-v1
    restart: unless-stopped
    ports:
      - "3001:3000"  # External port 3001, internal 3000 (avoids conflicts with other services)
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SITE_URL=https://v1.shieldnest.org
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - NEXT_PUBLIC_UPDATE_PUBLISHABLE_KEY=${NEXT_PUBLIC_UPDATE_PUBLISHABLE_KEY}
      - ADMIN_WALLET_ADDRESSES=${ADMIN_WALLET_ADDRESSES}
      - ADMIN_EMAILS=${ADMIN_EMAILS}
      - NEXT_PUBLIC_COREDEX_API=https://coredexapi.shieldnest.org/api
      - NEXT_PUBLIC_COREDEX_WS=wss://coredexapi.shieldnest.org/api/ws
    networks:
      - shieldnest-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  shieldnest-network:
    driver: bridge

